<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>HindiStenoLab - Direct Test</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; }
        @font-face { font-family: 'KrutiDev'; src: local('Kruti Dev 010'); }
        textarea { width: 100%; height: 300px; font-family: 'Kruti Dev 010'; font-size: 24px; padding: 15px; margin-top: 15px; border: 2px solid #ccc; border-radius: 10px; }
        .timer { font-size: 30px; color: red; font-weight: bold; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; background: #1e3799; color: white; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color:#1e3799;">HindiStenoLab Live Test</h1>
    <div class="timer" id="clock">10:00</div>
    <p>नीचे दिए गए बॉक्स में टाइप करना शुरू करें:</p>
    <textarea id="typingBox" onkeydown="handleKey(event)" placeholder="यहाँ टाइप करें..."></textarea>
    <button class="btn" onclick="showResult()">टेस्ट सबमिट करें</button>
    
    <div id="res" style="display:none; margin-top:20px; text-align:left; border-top:2px solid #eee; padding-top:20px;">
        <h2 id="score"></h2>
        <div id="diff" style="font-family:'Kruti Dev 010'; font-size:22px; line-height:2;"></div>
    </div>
</div>

<script>
    const masterText = "Hkkjr ,d egku ns'k gSA"; // आपका कृतिदेव मैटर
    let timeLeft = 600;

    // टाइमर शुरू करना
    setInterval(() => {
        if(timeLeft > 0) {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        } else {
            showResult();
        }
    }, 1000);

    function handleKey(e) {
        // स्मार्ट बैकस्पेस: स्पेस के बाद लॉक
        if (e.keyCode === 8 && e.target.value.endsWith(" ")) { e.preventDefault(); }
    }

    function showResult() {
        const typed = document.getElementById('typingBox').value.trim();
        const mArr = masterText.split(/\s+/);
        const tArr = typed.split(/\s+/);
        let correct = 0;
        let html = "";

        mArr.forEach((w, i) => {
            let tw = tArr[i] || "____";
            if (tw === w) { 
                correct++; 
                html += `<span style="color:green">${w} </span>`; 
            } else { 
                html += `<span style="color:red; text-decoration:line-through;">${tw}</span> <span style="color:blue">(${w})</span> `; 
            }
        });

        document.getElementById('score').innerText = `सही शब्द: ${correct} / ${mArr.length}`;
        document.getElementById('diff').innerHTML = html;
        document.getElementById('res').style.display = 'block';
        document.getElementById('typingBox').disabled = true;
    }
</script>

</body>
</html>

<div style="background:#f8f9fa; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #ddd;">
    <b>डिक्टेशन सुनें:</b><br>
    <audio id="stenoAudio" controls style="width:100%; margin-top:10px;">
        <source src="dictation1.mp3" type="audio/mpeg">
        आपका ब्राउज़र ऑडियो सपोर्ट नहीं करता।
    </audio>
</div>
