<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>HindiStenoLab - Live Mega Test</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 750px; margin: auto; }
        @font-face { font-family: 'KrutiDev'; src: local('Kruti Dev 010'); }
        textarea { width: 100%; height: 250px; font-family: 'Kruti Dev 010'; font-size: 24px; padding: 15px; margin-top: 15px; border: 2px solid #ccc; border-radius: 10px; }
        .btn { width: 100%; padding: 15px; background: #1e3799; color: white; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #1e3799; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color:#1e3799;">HindiStenoLab Live Arena</h1>
    
    <audio id="stenoAudio" controls style="width:100%; margin: 15px 0;">
        <source src="dictation1.mp3" type="audio/mpeg">
    </audio>

    <div style="font-size: 30px; color: red; font-weight: bold;" id="clock">10:00</div>
    <textarea id="typingBox" onkeydown="handleKey(event)" placeholder="यहाँ टाइप करें..."></textarea>
    <button class="btn" onclick="submitTest()">टेस्ट सबमिट करें</button>
    
    <div id="resArea" style="display:none; margin-top:20px;">
        <h2 id="finalScore"></h2>
        <div id="diff" style="font-family:'Kruti Dev 010'; font-size:22px; line-height:2; text-align:left; background:#f9f9f9; padding:15px;"></div>
    </div>

    <div id="ranking" style="margin-top:40px;">
        <h3>🏆 Live Ranking (Top 10)</h3>
        <table>
            <thead>
                <tr><th>Rank</th><th>नाम</th><th>गलतियाँ</th><th>Accuracy</th></tr>
            </thead>
            <tbody id="rankBody"></tbody>
        </table>
    </div>
</div>

<script>
    // --- यहाँ अपनी डिटेल्स डालें ---
    const sheetID = '1BxiMVs0XRA5nSMb_K697wvg'; // अपनी असली Google Sheet ID डालें
    const scriptURL = 'यहाँ_अपना_WEB_APP_URL_डालें'; // Apps Script से मिला URL
    const masterText = "Hkkjr ,d egku ns'k gSA"; 
    // ----------------------------

    let timeLeft = 600;
    setInterval(() => {
        if(timeLeft > 0) {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);

    function handleKey(e) {
        if (e.keyCode === 8 && e.target.value.endsWith(" ")) { e.preventDefault(); }
    }

    async function submitTest() {
        let name = prompt("रैंकिंग के लिए अपना नाम लिखें:");
        if (!name) return alert("नाम ज़रूरी है!");

        const typed = document.getElementById('typingBox').value.trim();
        const mArr = masterText.split(/\s+/);
        const tArr = typed.split(/\s+/);
        let correct = 0;
        let html = "";

        mArr.forEach((w, i) => {
            let tw = tArr[i] || "____";
            if (tw === w) { correct++; html += `<span style="color:green">${w} </span>`; }
            else { html += `<span style="color:red; text-decoration:line-through;">${tw}</span> <span style="color:blue">(${w})</span> `; }
        });

        let acc = ((correct/mArr.length)*100).toFixed(2);
        let mistakes = mArr.length - correct;

        document.getElementById('finalScore').innerText = `सही: ${correct} | गलतियाँ: ${mistakes} | Accuracy: ${acc}%`;
        document.getElementById('diff').innerHTML = html;
        document.getElementById('resArea').style.display = 'block';

        // गूगल शीट में डेटा भेजना
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ name: name, errors: mistakes, accuracy: acc })
        }).then(() => {
            alert("रिजल्ट सेव हो गया!");
            fetchRankings();
        });
    }

    async function fetchRankings() {
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            let html = "";
            json.table.rows.slice(0, 10).forEach((row, i) => {
                html += `<tr><td>${i+1}</td><td>${row.c[0].v}</td><td>${row.c[1].v}</td><td>${row.c[2].v}%</td></tr>`;
            });
            document.getElementById('rankBody').innerHTML = html;
        } catch(e) {}
    }
    fetchRankings();
</script>
</body>
</html>
